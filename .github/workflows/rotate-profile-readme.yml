name: Rotate profile README

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Force a profile (current or neofetch). Leave empty to auto-rotate."
        required: false
        type: choice
        options:
          - ""
          - current
          - neofetch

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: true

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: neofetch/cache/requirements.txt

      - name: Resolve profile and build
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
          FORCE_PROFILE: ${{ github.event.inputs.profile }}
          ROTATE_PROFILE: ${{ github.event_name == 'push' && 'false' || 'true' }}
        run: |
          set -euo pipefail

          PROFILE="$(python scripts/rotate_readme.py --print-only)"
          echo "Selected profile: ${PROFILE}"

          if [ "${PROFILE}" = "neofetch" ]; then
            if [ -z "${ACCESS_TOKEN:-}" ] || [ -z "${USER_NAME:-}" ]; then
              echo "ACCESS_TOKEN and USER_NAME secrets are required for the neofetch profile." >&2
              exit 1
            fi

            python -m pip install --upgrade pip
            python -m pip install -r neofetch/cache/requirements.txt
            (
              cd neofetch
              python today.py
            )
          fi

          python scripts/rotate_readme.py

      - name: Commit changes
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md neofetch .github/profile-state
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Rotate profile README ($(tr -d '\n' < .github/profile-state))"
          git push
